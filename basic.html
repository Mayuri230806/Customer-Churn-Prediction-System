<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Churn Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.container{

width:900px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,.3);

}

h1{

text-align:center;
margin-bottom:30px;
color:#203a43;

}

form{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;

}

.form-group{

display:flex;
flex-direction:column;

}

label{

font-weight:bold;
margin-bottom:5px;

}

input,select{

padding:10px;
border-radius:8px;
border:1px solid gray;
font-size:15px;

}

button{

grid-column:span 2;

padding:15px;
background:#203a43;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#0f2027;

}

</style>

</head>

<body>

<div class="container">

<h1>Customer Churn Prediction</h1>

<form action="/predict" method="POST">

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option value="0">Female</option>
<option value="1">Male</option>
</select>
</div>

<div class="form-group">
<label>Senior Citizen</label>
<select name="SeniorCitizen">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Partner</label>
<select name="Partner">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<select name="Dependents">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Tenure (Months)</label>
<input type="number" name="tenure" required>
</div>

<div class="form-group">
<label>Phone Service</label>
<select name="PhoneService">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Multiple Lines</label>
<select name="MultipleLines">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No Phone Service</option>
</select>
</div>

<div class="form-group">
<label>Internet Service</label>
<select name="InternetService">
<option value="0">DSL</option>
<option value="1">Fiber Optic</option>
<option value="2">No</option>
</select>
</div>

<div class="form-group">
<label>Online Backup</label>
<select name="OnlineBackup">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No Internet Service</option>
</select>
</div>

<div class="form-group">
<label>Tech Support</label>
<select name="TechSupport">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No Internet Service</option>
</select>
</div>

<div class="form-group">
<label>Streaming TV</label>
<select name="StreamingTV">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No Internet Service</option>
</select>
</div>

<div class="form-group">
<label>Streaming Movies</label>
<select name="StreamingMovies">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No Internet Service</option>
</select>
</div>

<div class="form-group">
<label>Contract</label>
<select name="Contract">
<option value="0">Month-to-Month</option>
<option value="1">One Year</option>
<option value="2">Two Year</option>
</select>
</div>

<div class="form-group">
<label>Paperless Billing</label>
<select name="PaperlessBilling">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Payment Method</label>
<select name="PaymentMethod">
<option value="0">Bank Transfer</option>
<option value="1">Credit Card</option>
<option value="2">Electronic Check</option>
<option value="3">Mailed Check</option>
</select>
</div>

<div class="form-group">
<label>Monthly Charges</label>
<input type="number" step="0.01" name="MonthlyCharges" required>
</div>

<div class="form-group">
<label>Total Charges</label>
<input type="number" step="0.01" name="TotalCharges" required>
</div>

<div class="form-group">
<label>Online Security</label>
<select name="OnlineSecurity">
<option value="No">No</option>
<option value="Yes">Yes</option>
<option value="No internet service">No Internet Service</option>
</select>
</div>

<div class="form-group">
<label>Device Protection</label>
<select name="DeviceProtection">
<option value="No">No</option>
<option value="Yes">Yes</option>
<option value="No internet service">No Internet Service</option>
</select>
</div>

<button type="submit">
Predict Churn
</button>

</form>

</div>

</body>
</html>
